# Build & test gate for pushes to master and every pull request.
#
# Single Java 25 toolchain: the build always compiles with a Java 25 javac (the
# Jabel fork emits Java 8 bytecode from it). The suite then runs on a matrix of
# runtimes via -PtestJdk so the Java 8 bytecode/runtime floor stays honest -- the
# -PtestJdk=8 leg is the guard that nothing Java 9+ leaks into production or tests.
#
# Two JDKs are installed per leg: the matrix runtime (runs the tests) plus Java 25
# (the compile toolchain and Gradle launcher). gradle.properties keeps toolchain
# auto-download off, so Gradle is pointed at both setup-java installs through
# org.gradle.java.installations.fromEnv.
#
# No services to stand up: EveryConfig is a pure library (Jackson only), so unlike
# the database project there is no docker-compose step here.

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test on Java ${{ matrix.jdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: [ 8, 11, 17, 21, 25 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The matrix runtime runs the suite; Java 25 is always installed as the
      # compile toolchain + Gradle launcher. Listed last so JAVA_HOME points at 25.
      - name: Set up JDKs ${{ matrix.jdk }} and 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            ${{ matrix.jdk }}
            25

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle (dependency + build cache)
        uses: gradle/actions/setup-gradle@v4

      # build = compile (Java 25 -> Java 8 bytecode) + the full suite on -PtestJdk.
      # --rerun-tasks because -PtestJdk does not invalidate the test task's
      # up-to-date check. fromEnv tells Gradle where the two setup-java JDKs live.
      - name: Build & test
        run: |
          ./gradlew build \
            -PtestJdk=${{ matrix.jdk }} \
            -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.jdk }}_X64,JAVA_HOME_25_X64 \
            --rerun-tasks --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.jdk }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
